name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: agent · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  ui:
    name: ui · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run build # tsc --noEmit && vite build

  move:
    name: move · build + test
    runs-on: ubuntu-latest
    env:
      SUI_VERSION: testnet-v1.73.1
    steps:
      - uses: actions/checkout@v5
      - name: Cache Sui CLI
        id: cache-sui
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/sui
          key: sui-${{ env.SUI_VERSION }}-ubuntu-x86_64
      - name: Install Sui CLI
        if: steps.cache-sui.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin /tmp/suidl
          curl -fsSL -o /tmp/sui.tgz \
            "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz"
          tar -xzf /tmp/sui.tgz -C /tmp/suidl --no-same-owner
          find /tmp/suidl -maxdepth 3 -type f -name sui -exec mv {} "$HOME/.local/bin/sui" \;
          chmod +x "$HOME/.local/bin/sui"
      - name: Add Sui to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: sui --version
      - run: sui move build
      - run: sui move test
